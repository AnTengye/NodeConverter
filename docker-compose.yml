services:
  nodeconverter:
    build:
      context: .
      dockerfile: Dockerfile
    image: nodeconverter:latest
    container_name: nodeconverter
    restart: unless-stopped
    ports:
      - "25500:25500"
    volumes:
      # Mount config files for easy modification without rebuilding
      - ./config.yaml:/app/config.yaml:ro
      - ./clash-tpl.yaml:/app/clash-tpl.yaml:ro
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:25500/sub"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
